  <!-- Tags -->
  <rect x="122" y="415" width="130" height="36" rx="6" fill="#5B8DEF" opacity="0.15"/>
  <text x="145" y="438" font-family="'Helvetica Neue', Arial, sans-serif" font-size="18" fill="#5B8DEF">Next.js</text>

  <rect x="268" y="415" width="110" height="36" rx="6" fill="#5B8DEF" opacity="0.15"/>
  <text x="291" y="438" font-family="'Helvetica Neue', Arial, sans-serif" font-size="18" fill="#5B8DEF">React</text>

  <rect x="394" y="415" width="130" height="36" rx="6" fill="#5B8DEF" opacity="0.15"/>
  <text x="416" y="438" font-family="'Helvetica Neue', Arial, sans-serif" font-size="18" fill="#5B8DEF">Node.js</text>

  <rect x="540" y="415" width="160" height="36" rx="6" fill="#5B8DEF" opacity="0.15"/>
  <text x="560" y="438" font-family="'Helvetica Neue', Arial, sans-serif" font-size="18" fill="#5B8DEF">PostgreSQL</text>

