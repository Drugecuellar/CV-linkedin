  <!-- Full name smaller -->
  <text x="122" y="305" font-family="'Helvetica Neue', Arial, sans-serif" font-size="26" font-weight="300" fill="#94A3B8" letter-spacing="1">Stiven Ruge Cuellar</text>

  <!-- Divider -->
  <rect x="120" y="330" width="500" height="1" fill="#5B8DEF" opacity="0.3"/>

  <!-- Title -->
