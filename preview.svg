  <!-- URL -->
  <text x="122" y="550" font-family="'Helvetica Neue', Arial, sans-serif" font-size="20" fill="#5B8DEF" opacity="0.7">drugecuellar.github.io/CV-linkedin</text>

  <!-- Right decoration - code lines -->
  <g opacity="0.08">
    <rect x="820" y="200" width="280" height="14" rx="4" fill="#5B8DEF"/>
    <rect x="820" y="228" width="220" height="14" rx="4" fill="#94A3B8"/>
    <rect x="840" y="256" width="180" height="14" rx="4" fill="#94A3B8"/>
